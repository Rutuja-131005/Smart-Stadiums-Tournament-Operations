version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: smart-stadiums-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-stadiums-api
    ports:
      - '8080:8080'
    environment:
      NODE_ENV: production
      PORT: 8080
      MONGODB_URI: mongodb://mongodb:27017/smart-stadiums
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped

  dev-backend:
    image: node:20-alpine
    container_name: smart-stadiums-dev-api
    working_dir: /app
    volumes:
      - ./server:/app
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/smart-stadiums
      JWT_SECRET: dev-secret-key
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      CORS_ORIGIN: http://localhost:5173
    command: sh -c "npm install && npm run dev"
    depends_on:
      mongodb:
        condition: service_healthy
    profiles:
      - dev

  dev-frontend:
    image: node:20-alpine
    container_name: smart-stadiums-dev-ui
    working_dir: /app
    volumes:
      - ./client:/app
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:5000/api
      VITE_SOCKET_URL: http://localhost:5000
    command: sh -c "npm install && npm run dev -- --host"
    depends_on:
      - dev-backend
    profiles:
      - dev

volumes:
  mongo_data:
