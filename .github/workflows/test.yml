name: Smart Stadiums CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Full Test Suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm install

      - name: Install all workspace dependencies
        run: npm run install:all

      - name: Build client assets
        run: npm run build

      - name: Run server tests (Jest + Coverage)
        run: npm test --prefix server
        env:
          JWT_SECRET: ci-test-secret-key
          NODE_ENV: test

      - name: Run client tests (Vitest)
        run: npm test --prefix client
        env:
          NODE_ENV: test

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm run install:all

      - name: Run ESLint
        run: npx eslint . --ext .js,.jsx --max-warnings 0 || true
